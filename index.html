    <script>
      // Unified tracking helper: send browser pixel and POST to admin (CAPI relay)
      window.trackEventToDB = function(eventName, payload = {}) {
        try { if (window.fbq) fbq('track', eventName, payload); } catch(e) { /* silent */ }

        var baseApi = 'http://72.62.243.85:3001';
        try {
          fetch(baseApi + '/api/track-pixel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              pixel_id: '1643574053295392',
              event_name: eventName,
              url: window.location.href,
              user_agent: navigator.userAgent,
              timestamp: new Date().toISOString(),
              payload: payload
            })
          }).catch(err => console.log('CAPI Error:', err));
        } catch (e) { console.log('CAPI Fetch Error:', e); }
      }

      window.trackEventAndRedirect = function(eventName, shouldRedirect = false, redirectUrl = '') {
        window.trackEventToDB(eventName, {});
        if (shouldRedirect && redirectUrl) window.location.href = redirectUrl;
      }

      // Trigger PageView tracking immediately on page load (runs silently)
      window.addEventListener('load', function() { try { window.trackEventAndRedirect('PageView', false); } catch(e) { console.log('trackEventAndRedirect error', e); } });
    </script>
