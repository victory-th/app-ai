
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory Game - VictoryBlitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Kanit:wght@200;400;600&family=Space+Grotesk:wght@300;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Facebook Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.tagName[0];s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      
      fbq('init', '2072787790188101'); 
      fbq('track', 'PageView');
    </script>

    <script>
      // ฟังก์ชันสำหรับส่ง Event ไปที่ Database เพื่อให้ Trigger CAPI ทำงาน
      window.trackEventToDB = function(eventName, payload = {}) {
        // ส่ง Standard Event ไปที่ Facebook Browser ก่อน
        if (window.fbq) {
          fbq('track', eventName, payload);
        }

        // ส่งข้อมูลไปที่ตาราง fb_pixel_events ใน Database
        fetch('/api/track-pixel', { 
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_name: eventName,
            payload: payload,
            url: window.location.href,
            timestamp: new Date().toISOString()
          })
        }).catch(err => console.log('CAPI Error:', err));
      }
    </script>
    
    <style>
