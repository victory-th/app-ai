<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory Game - VictoryBlitz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Kanit:wght@200;400;600&family=Space+Grotesk:wght@300;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      
      fbq('init', '1643574053295392'); 
      fbq('track', 'PageView');
    </script>

    <script>
      window.trackEventAndRedirect = function(eventName) {
        // ส่ง Browser Pixel
        if (window.fbq) fbq('track', eventName);

        // เตรียมข้อมูลส่งไป Admin 3001 เพื่อยิง CAPI
        var baseApi = (window.location.hostname === 'localhost') ? '' : 'http://72.62.243.85:3001';
        
        fetch(baseApi + '/api/track-pixel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pixel_id: '1643574053295392',
            event_name: eventName,
            url: window.location.href,
            user_agent: navigator.userAgent,
            timestamp: new Date().toISOString()
          })
        })
        .then(() => {
          console.log('CAPI Sent');
          // เลือกเปิดใช้งาน Redirect ทันที หรือหน่วงเวลาเล็กน้อยเพื่อให้สัญญาณไปชัวร์
          // setTimeout(() => { window.location.href = "https://victorygame.vercel.app" + window.location.search; }, 1000);
        })
        .catch(err => console.log('CAPI Error:', err));
      }

      // สั่งให้ทำงานทันทีที่โหลดหน้า
      window.onload = function() {
        window.trackEventAndRedirect('PageView');
      };
    </script>
    
    <style>
        body { background-color: #0a0a0c; color: white; margin: 0; font-family: 'Kanit', sans-serif; overflow-x: hidden; }
        .font-fantasy { font-family: 'Cinzel', serif; }
        .font-modern { font-family: 'Space Grotesk', sans-serif; }
        .font-futuristic { font-family: 'Orbitron', sans-serif; }
        .glow-text { text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
        .glass-panel { background: rgba(25, 25, 30, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #252529; border-radius: 10px; }
    </style>
