workflows:
  capacitor-android-apk:
    name: Capacitor Android APK
    max_build_duration: 60

    environment:
      node: 22.14.0
      java: 17

    working_directory: app-ai

    cache:
      cache_paths:
        - ~/.npm

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor Android project
        script: |
          npx cap sync android

      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - app-ai/android/app/build/outputs/**/*.apk
